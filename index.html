<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teto Rhythm Game</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

#score, #combo {
    position: absolute;
    top: 10px;
    font-size: 24px;
    z-index: 10;
}
#score { left: 10px; }
#combo { right: 10px; }

#gameCanvas {
    position: absolute;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

#bg {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: url('immagine_2026-03-03_204259655.png') center center/cover no-repeat;
    filter: brightness(0.4) blur(4px);
}

#hitLine {
    position: absolute;
    bottom: 70px;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.5);
    z-index: 5;
}

button {
    position: relative;
    font-size: 18px;
    padding: 10px 20px;
    margin: 5px;
    z-index: 10;
}
#menu {
    position: absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="hitLine"></div>
<canvas id="gameCanvas"></canvas>

<div id="menu">
    <button id="startBtn">Start</button>
    <button id="settingsBtn">Impostazioni</button>
</div>

<audio id="bgm" src="BIRDBRAIN.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bgm = document.getElementById("bgm");
const startBtn = document.getElementById("startBtn");
const settingsBtn = document.getElementById("settingsBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let notes = []; // {time: secondi, x: posX, hit: false}
let score = 0;
let combo = 0;
let gameRunning = false;
let hitKey = "Space"; // default

// --- Genera note ---
const bpm = 140;
const beatInterval = 60/bpm;
const noteSpeed = 400;
const totalBeats = 50;
for(let i=0;i<totalBeats;i++){
    const time = i*beatInterval;
    const x = Math.random()*(canvas.width-50)+25;
    notes.push({time:time, x:x, hit:false});
}

// --- Effetti luminosi ---
let effects = [];
function drawEffects(){
    effects.forEach((e,index)=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${e.alpha})`;
        ctx.fill();
        e.alpha -= 0.02;
        e.radius += 1;
        if(e.alpha <=0) effects.splice(index,1);
    });
}

// --- Funzioni gioco ---
function startGame(){
    if(gameRunning) return;
    gameRunning = true;
    document.getElementById("menu").style.display="none";
    bgm.currentTime = 0;
    bgm.play();
    requestAnimationFrame(gameLoop);
}

function drawNotes(currentTime){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'red';
    notes.forEach(note=>{
        if(note.hit) return;
        const y = (note.time - currentTime)*noteSpeed + (canvas.height-70);
        if(y<0) return;
        // disegna cubo arrotondato
        const size = 40;
        const radius = 8;
        ctx.beginPath();
        ctx.moveTo(note.x + radius, y);
        ctx.lineTo(note.x + size - radius, y);
        ctx.quadraticCurveTo(note.x + size, y, note.x + size, y + radius);
        ctx.lineTo(note.x + size, y + size - radius);
        ctx.quadraticCurveTo(note.x + size, y + size, note.x + size - radius, y + size);
        ctx.lineTo(note.x + radius, y + size);
        ctx.quadraticCurveTo(note.x, y + size, note.x, y + size - radius);
        ctx.lineTo(note.x, y + radius);
        ctx.quadraticCurveTo(note.x, y, note.x + radius, y);
        ctx.fill();
    });
    drawEffects();
}

// --- Controllo tasto selezionabile ---
let keyPressed = false;
document.addEventListener("keydown", function(e){
    if(e.code===hitKey && !keyPressed){
        keyPressed = true;
        const currentTime = bgm.currentTime;
        let hit = false;
        notes.forEach(note=>{
            if(note.hit) return;
            const y = (note.time - currentTime)*noteSpeed + (canvas.height-70);
            if(y >= canvas.height-90 && y <= canvas.height-50){
                note.hit = true;
                hit = true;
                effects.push({x:note.x+20, y:y+20, alpha:1, radius:10});
            }
        });
        if(hit){
            combo +=1;
            score += 100 * combo;
        } else {
            combo = 0;
        }
        document.getElementById("score").innerText = "Punti: " + score;
        document.getElementById("combo").innerText = "Combo: " + combo + "x";
    }
});
document.addEventListener("keyup", function(e){
    if(e.code===hitKey) keyPressed = false;
});

// --- Loop principale ---
function gameLoop(){
    if(!gameRunning) return;
    const currentTime = bgm.currentTime;
    drawNotes(currentTime);
    requestAnimationFrame(gameLoop);
}

// --- Start e Settings ---
startBtn.addEventListener("click", startGame);

settingsBtn.addEventListener("click", function(){
    const newKey = prompt("Inserisci il tasto da usare (es. Space, KeyZ, KeyX):", hitKey);
    if(newKey) hitKey = newKey;
    alert("Tasto impostato su: " + hitKey);
});
</script>
</body>
</html>
