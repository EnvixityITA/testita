<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOID NOVA</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#bgImg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 1s, transform 0.1s;filter:blur(6px) brightness(0.45);}
#gameCanvas{position:absolute;width:100%;height:100%;z-index:1;}
#introScreen{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;z-index:10;opacity:0;transform:scale(0.95);}
#logo{width:350px;margin-bottom:20px;filter:drop-shadow(0 0 20px white);}
#songTitle{font-size:32px;margin-bottom:5px;}
#difficulty{margin-bottom:20px;font-size:20px;}
#songSelector{margin-bottom:15px;padding:8px 12px;font-size:18px;}
#startBtn{padding:10px 20px;font-size:18px;cursor:pointer;background: rgba(255,255,255,0.1);color:white;border:2px solid white;border-radius:6px;}
#score,#combo,#rank{position:absolute;top:10px;font-size:22px;z-index:5;}
#score{left:10px;} #combo{left:200px;} #rank{left:360px;}
.columnLabel{position:absolute;font-size:20px;text-align:center;transform:translateX(-50%);color:white;}
#keySettings{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:10px 15px;border-radius:8px;display:none;z-index:20;}
#keySettings td{border:1px solid rgba(255,255,255,0.3);padding:8px 15px;text-align:center;cursor:pointer;color:white;font-weight:bold;}
#keySettings td:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>

<img id="bgImg">
<div id="introScreen">
<img id="logo" src="Risorsa_1sinny.png" alt="Logo">
<h1 id="songTitle">BIRDBRAIN</h1>
<div id="difficulty"></div>
<select id="songSelector">
<option value="BIRDBRAIN">BIRDBRAIN</option>
<option value="Mesmerizer">MESMERIZER</option>
<option value="ECHO">ECHO</option>
</select>
<button id="startBtn">START</button>
</div>

<div id="keySettings">
<table><tr>
<td id="col0">D</td>
<td id="col1">F</td>
<td id="col2">J</td>
<td id="col3">K</td>
<td id="col4">Space</td>
</tr></table>
<small>Clicca su un tasto per cambiarlo</small>
</div>

<canvas id="gameCanvas"></canvas>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="rank">Rank: F</div>
<audio id="bgm"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let arrowZoneWidth = canvas.width*0.6;
let columns = 4;
let columnWidth = arrowZoneWidth/columns;
let arrowZoneOffset = (canvas.width-arrowZoneWidth)/2;

// Colonne e tasti
let columnKeys=["D","F","J","K"];
let columnCodes=["KeyD","KeyF","KeyJ","KeyK"];
let columnColors=[];

// Aggiungi quinta colonna solo per ECHO
function updateColumns(){
columns = (selector.value==="ECHO")?5:4;
arrowZoneWidth = canvas.width*0.6;
columnWidth = arrowZoneWidth/columns;
arrowZoneOffset = (canvas.width-arrowZoneWidth)/2;
}

// Imposta colori note
function updateNoteColors(){
const t=bgm.currentTime;
if(selector.value==="BIRDBRAIN"){
columnColors = ["#ff0000","#ff8000","#ff40bf","#ffff00"];
} else if(selector.value==="Mesmerizer"){
if(t<bgm.duration/2){
columnColors = ["#00ffff","#00bfff","#0080ff","#0040ff"];
} else {
columnColors = ["#ff0000","#ff8000","#ff40bf","#ffff00"];
}
} else if(selector.value==="ECHO"){
columnColors = ["#00ff00","#40ff00","#80ff00","#bfff00","#ff00ff"];
}
}

// Canzoni
const songs={
"BIRDBRAIN":{mp3:"BIRDBRAIN.mp3",BPM:140,difficulty:"MEDIO",color:"yellow",speed:400,bg:"immagine_2026-03-03_204259655.png"},
"Mesmerizer":{mp3:"mesmerizer.mp3",BPM:120,difficulty:"DIFFICILE",color:"red",speed:400*1.75,bg:"immagine_2026-03-03_221829535.png"},
"ECHO":{mp3:"SpotiDownloader.com - Echo (feat. Crusher-P) - The Living Tombstone.mp3",BPM:130,difficulty:"INSANA",color:"purple",speed:400*2.75,bg:"immagine_2026-03-05_202041367.png"}
};
let currentSong = songs["BIRDBRAIN"];

const bgm=document.getElementById("bgm");
const bgImg=document.getElementById("bgImg");
const scoreDisplay=document.getElementById("score");
const comboDisplay=document.getElementById("combo");
const rankDisplay=document.getElementById("rank");
const selector=document.getElementById("songSelector");
const introScreen=document.getElementById("introScreen");
const logo=document.getElementById("logo");
const startBtn=document.getElementById("startBtn");

let notes=[],chart=[],noteIndex=0,hitRatings=[];
let score=0,combo=0,totalHits=0,totalPerfect=0,noteSpeed=400,gameRunning=false,lastTime=0;
const hitLineHeight = 15;

// Aggiorna UI
function updateSongUI(){
document.getElementById("songTitle").innerText=selector.value;
document.getElementById("difficulty").innerText=currentSong.difficulty.toUpperCase();
document.getElementById("difficulty").style.color=currentSong.color;
updateColumns();
}
selector.onchange=()=>{
currentSong=songs[selector.value];
updateSongUI();
}
updateSongUI();

// Chart generico
function generateFullChart(){
chart=[];
const BPM=currentSong.BPM;
const beat=60/currentSong.BPM;
const duration=bgm.duration;
for(let t=0;t<duration;t+=beat){
let col=Math.floor(columns*Math.random());
chart.push({time:t,column:col});
}
}

// Start game
startBtn.onclick=()=>{
introScreen.style.transition="opacity 0.5s";
introScreen.style.opacity=0;
setTimeout(()=>{
introScreen.style.display="none"; 
bgImg.src=currentSong.bg; 
bgImg.style.opacity=1; 
startGame();
},500);
}

function startGame(){
notes=[]; chart=[]; noteIndex=0;
score=0; combo=0; totalHits=0; totalPerfect=0;
noteSpeed=currentSong.speed;
bgm.src=currentSong.mp3; bgm.currentTime=0;
bgm.onloadedmetadata=()=>{
generateFullChart();
bgm.play();
gameRunning=true;
lastTime=0;
requestAnimationFrame(gameLoop);
}
}

// Key settings
const keySettings=document.getElementById("keySettings");
startBtn.addEventListener("click",()=>{keySettings.style.display = keySettings.style.display==="none"?"block":"none";});
for(let i=0;i<5;i++){
document.getElementById("col"+i).addEventListener("click",()=>{
const newKey=prompt("Inserisci nuovo tasto per colonna "+(i+1), columnKeys[i]||"Space");
if(newKey){ columnKeys[i]=newKey.toUpperCase(); columnCodes[i]= newKey===" "?"Space":"Key"+newKey.toUpperCase(); document.getElementById("col"+i).innerText=columnKeys[i]; }
});
}

// Spawn note
function spawnNotes(time){
while(noteIndex<chart.length && chart[noteIndex].time <= time){
notes.push({y:-50,column:chart[noteIndex].column,hit:false});
noteIndex++;
}
}

// Draw columns & labels
function drawColumns(){
for(let i=0;i<=columns;i++){
ctx.strokeStyle="rgba(255,255,255,0.2)";
ctx.beginPath();
ctx.moveTo(arrowZoneOffset + i*columnWidth,0);
ctx.lineTo(arrowZoneOffset + i*columnWidth,canvas.height);
ctx.stroke();
}
}

function drawKeyLabels(){
for(let i=0;i<columns;i++){
let label=document.getElementById("label"+i);
if(!label){
label=document.createElement("div");
label.id="label"+i;
label.className="columnLabel";
label.innerText=columnKeys[i];
document.body.appendChild(label);
}
label.style.left=(arrowZoneOffset + i*columnWidth + columnWidth/2)+"px";
label.style.bottom="30px";
}
}

// Key press
document.addEventListener("keydown",e=>{
if(!gameRunning)return;
for(let note of notes){
if(note.hit)continue;
let code = columnCodes[note.column];
if(code==="Space") code="Space";
if(e.code===code && note.y>canvas.height-70-hitLineHeight && note.y<canvas.height-40){
note.hit=true; combo++; totalHits++;
const dist=Math.abs(note.y-(canvas.height-70));
if(dist<5) totalPerfect++;
score+=100*(1+combo*0.05);
let rating="MEH";
if(dist<5) rating="PERFECT";
else if(dist<10) rating="SICK";
else if(dist<20) rating="AWESOME";
else if(dist<35) rating="NICE";
const img=new Image();
img.src=rating+".png";
hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y:canvas.height-120,alpha:1});
}
}
});

// Main loop
function gameLoop(timestamp){
if(!gameRunning)return;
const delta=(timestamp-lastTime)/1000;
lastTime=timestamp;

updateNoteColors();
spawnNotes(bgm.currentTime);

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "rgba(255,255,255,0.2)";
ctx.fillRect(arrowZoneOffset, canvas.height - 70 - hitLineHeight/2, arrowZoneWidth, hitLineHeight);

drawColumns();
drawKeyLabels();

const beat = 60/currentSong.BPM;
const pulse = Math.sin((bgm.currentTime/beat)*Math.PI*2);
bgImg.style.transform = "scale("+(1+pulse*0.02)+")";

for(let note of notes){
if(note.hit)continue;
note.y+=noteSpeed*delta;
ctx.fillStyle=columnColors[note.column];
ctx.fillRect(arrowZoneOffset+note.column*columnWidth+10,note.y,columnWidth-20,50);
if(note.y>canvas.height-70){
note.hit=true;
combo=0;
totalHits++;
const img=new Image();
img.src="MISS.png";
hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y:canvas.height-70,alpha:1});
}
}

for(let i=hitRatings.length-1;i>=0;i--){
const r=hitRatings[i];
ctx.globalAlpha=r.alpha;
ctx.drawImage(r.img,r.x-50,r.y-25,100,50);
r.y-=1; r.alpha-=0.02;
if(r.alpha<=0) hitRatings.splice(i,1);
}
ctx.globalAlpha=1;

scoreDisplay.innerText="Punti: "+Math.floor(score);
comboDisplay.innerText="Combo: "+combo+"x";

requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
