<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game - Song Selector</title>
<style>
body {margin:0;overflow:hidden;font-family:Arial;background:black;color:white;}
#score,#combo,#rank{position:absolute;top:10px;font-size:24px;z-index:10;}
#score{left:10px;} 
#combo{left:200px;} 
#rank{left:400px;}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
    background:center center/cover no-repeat;
    filter:brightness(0.3) blur(4px);
    opacity:0; transition:opacity 1s ease-in;}
#hitLine{position:absolute;bottom:70px;left:0;width:100%;height:3px;background:rgba(255,255,255,0.5);z-index:5;opacity:0;}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;}
button, select{font-size:18px;padding:10px 20px;margin:5; cursor:pointer;}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="gameCanvas"></canvas>
<div id="menu">
<select id="songSelector">
  <option value="BIRDBRAIN">BIRDBRAIN</option>
  <option value="Mesmerizer">Mesmerizer</option>
</select>
<br>
<button id="startBtn">Start</button>
</div>

<audio id="bgm" crossorigin="anonymous"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bg = document.getElementById("bg");
const bgm = document.getElementById("bgm");
const startBtn = document.getElementById("startBtn");
const songSelector = document.getElementById("songSelector");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Song data ---
const songs = {
    "BIRDBRAIN": {
        mp3: "BIRDBRAIN.mp3",
        bg: "immagine_2026-03-03_204259655.png",
        notes: [
            {time:0.5,column:0},{time:1,column:1},{time:1.5,column:2},{time:2,column:3},
            {time:2.5,column:0},{time:3,column:1},{time:3.5,column:2},{time:4,column:3}
        ]
    },
    "Mesmerizer": {
        mp3: "mesmerizer.mp3",
        bg: "immagine_2026-03-03_214702471.png",
        notes: [
            {time:0.3,column:0},{time:0.6,column:2},{time:1,column:1},{time:1.4,column:3},
            {time:1.7,column:0},{time:2.1,column:2},{time:2.5,column:1},{time:2.8,column:3}
        ]
    }
};

let currentSong = songs[songSelector.value];
let notes = [];
let gameRunning = false;

songSelector.addEventListener("change", () => {
    currentSong = songs[songSelector.value];
});

startBtn.addEventListener("click", () => {
    if(gameRunning) return;
    notes = currentSong.notes.map(n => ({...n, hit:false}));
    bg.style.backgroundImage = `url('${currentSong.bg}')`;
    bg.style.opacity = 1;
    bgm.src = currentSong.mp3;
    bgm.currentTime = 0;
    bgm.play();
    gameRunning = true;
    document.getElementById("menu").style.display = "none";
    requestAnimationFrame(gameLoop);
});

// --- Minimal loop di gioco ---
function drawNotes(currentTime){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    notes.forEach(note => {
        if(note.hit) return;
        const y = (currentTime - note.time) * 400;
        if(y>canvas.height) return;
        const colWidth = canvas.width/4;
        ctx.fillStyle = "red";
        ctx.fillRect(note.column*colWidth+10, y, colWidth-20, 30);
    });
}

function gameLoop(){
    if(!gameRunning) return;
    drawNotes(bgm.currentTime);
    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
