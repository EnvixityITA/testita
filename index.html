<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let arrowZoneWidth = canvas.width*0.6;
let columns = 4;
let columnWidth = arrowZoneWidth/columns;
let arrowZoneOffset = (canvas.width-arrowZoneWidth)/2;

let columnKeys=[]; 
const columnColors=[];

const bgm=document.getElementById("bgm");
const bgmMenu=document.getElementById("bgmMenu");
bgmMenu.src="menu_bgm.mp3"; 
bgmMenu.volume=0.5;
bgmMenu.play();

const bgImg=document.getElementById("bgImg");
const scoreDisplay=document.getElementById("score");
const comboDisplay=document.getElementById("combo");
const rankDisplay=document.getElementById("rank");
const selector=document.getElementById("songSelector");
const selector2=document.getElementById("songSelector2");
const introScreen=document.getElementById("introScreen");
const startBtn=document.getElementById("startBtn");
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");

const tabKeysBtn=document.getElementById("tabKeysBtn");
const tabSongsBtn=document.getElementById("tabSongsBtn");
const tabKeys=document.getElementById("tabKeys");
const tabSongs=document.getElementById("tabSongs");

const hitLineHeight=25;

const songs={
"BIRDBRAIN":{mp3:"BIRDBRAIN.mp3",BPM:140,difficulty:"MEDIO",color:"yellow",speed:300,bg:"immagine_2026-03-03_204259655.png"},
"Mesmerizer":{mp3:"mesmerizer.mp3",BPM:120,difficulty:"DIFFICILE",color:"red",speed:400*1.75,bg:"immagine_2026-03-03_221829535.png"},
"ECHO":{mp3:"SpotiDownloader.com - Echo (feat. Crusher-P) - The Living Tombstone.mp3",BPM:130,difficulty:"INSANA",color:"purple",speed:400*1.85,bg:"immagine_2026-03-05_202041367.png"}
};

let currentSong = songs["BIRDBRAIN"];
let notes=[],chart=[],noteIndex=0,hitRatings=[];
let score=0,combo=0,totalHits=0,totalPerfect=0,noteSpeed=300,gameRunning=false,lastTime=0;

function updateColumns(){
    if(currentSong===songs["ECHO"]){columns=5;} else{columns=4;}
    arrowZoneWidth = canvas.width*0.6;
    columnWidth = arrowZoneWidth/columns;
    arrowZoneOffset = (canvas.width-arrowZoneWidth)/2;
}

function updateColumnKeys(){
    if(currentSong===songs["ECHO"]){
        columnKeys = ["D","F","H","J","K"];
    }else{
        columnKeys = ["D","F","J","K"];
    }
}

function updateNoteColors(){
    if(currentSong===songs["BIRDBRAIN"]){columnColors.splice(0,4,...["#ff0000","#ff8000","#ff40bf","#ffff00"]);}
    else if(currentSong===songs["Mesmerizer"]){columnColors.splice(0,4,...["#00ffff","#00bfff","#0080ff","#0040ff"]);}
    else if(currentSong===songs["ECHO"]){columnColors.splice(0,5,...["#00ff00","#40ff00","#80ff00","#bfff00","#ff00ff"]);}
}

function updateSongUI(){
    document.getElementById("songTitle").innerText=selector.value;
    document.getElementById("difficulty").innerText=currentSong.difficulty.toUpperCase();
    document.getElementById("difficulty").style.color=currentSong.color;
    updateColumns();
    updateColumnKeys();
    drawKeyLabels();
}

settingsBtn.onclick=()=>{settingsPanel.style.display = settingsPanel.style.display==="none"?"block":"none";}
tabKeysBtn.onclick=()=>{tabKeys.style.display="block"; tabSongs.style.display="none";}
tabSongsBtn.onclick=()=>{tabKeys.style.display="none"; tabSongs.style.display="block";}
document.getElementById("volumeSlider").oninput=function(){bgm.volume=this.value;};

selector.onchange=function(){
    currentSong=songs[selector.value];
    selector2.value=selector.value;
    updateSongUI();
}
selector2.onchange=function(){
    currentSong=songs[selector2.value];
    selector.value=selector2.value;
    updateSongUI();
}

function generateFullChart(){
    chart=[];
    const beat=60/currentSong.BPM;
    const duration=bgm.duration||120;
    for(let t=beat; t<duration; t+=beat){
        if(currentSong===songs["ECHO"]){
            let col=Math.floor(Math.random()*5);
            chart.push({time:t,column:col});
            if(Math.random()<0.35){let extraCol=Math.floor(Math.random()*5); chart.push({time:t+beat*0.2,column:extraCol});}
        }else{chart.push({time:t,column:Math.floor(4*Math.random())});}
    }
}

startBtn.onclick=()=>{
    introScreen.style.opacity=0;
    setTimeout(()=>{
        introScreen.style.display="none"; 
        bgImg.src=currentSong.bg; 
        bgImg.style.opacity=1; 
        bgmMenu.pause();
        startGame();
    },500);
}

function startGame(){
    notes=[]; chart=[]; noteIndex=0;
    score=0; combo=0; totalHits=0; totalPerfect=0;
    noteSpeed=currentSong.speed;
    bgm.src=currentSong.mp3; bgm.currentTime=0;
    bgm.volume=document.getElementById("volumeSlider").value;
    bgm.onloadedmetadata=()=>{
        generateFullChart();
        gameRunning=true;
        lastTime=0;
        requestAnimationFrame(gameLoop);
        bgm.play();
    }
}

for(let i=0;i<5;i++){
    document.getElementById("col"+i)?.addEventListener("click",()=>{
        let currentKey = columnKeys[i] || "";
        const newKey=prompt("Inserisci nuovo tasto per colonna "+(i+1), currentKey);
        if(newKey){ 
            columnKeys[i]=newKey.toUpperCase(); 
            document.getElementById("col"+i).innerText = newKey.toUpperCase(); 
        }
    });
}

function spawnNotes(time){
    while(noteIndex<chart.length && chart[noteIndex].time <= time + 0.1){ 
        if(chart[noteIndex].time>0){notes.push({y:-50,column:chart[noteIndex].column,hit:false});}
        noteIndex++;
    }
}

function drawColumns(){
    for(let i=0;i<=columns;i++){
        ctx.strokeStyle="rgba(255,255,255,0.2)";
        ctx.beginPath();
        ctx.moveTo(arrowZoneOffset + i*columnWidth,0);
        ctx.lineTo(arrowZoneOffset + i*columnWidth,canvas.height);
        ctx.stroke();
    }
}

function drawKeyLabels(){
    for(let i=0;i<columns;i++){
        let label=document.getElementById("label"+i);
        if(!label){
            label=document.createElement("div");
            label.id="label"+i;
            label.className="columnLabel";
            document.body.appendChild(label);
        }
        label.innerText=columnKeys[i] || "";
        label.style.left=(arrowZoneOffset + i*columnWidth + columnWidth/2)+"px";
        label.style.bottom="30px";
        label.style.display="block";
    }
    // Nasconde eventuali label extra
    for(let i=columns;i<5;i++){
        let label=document.getElementById("label"+i);
        if(label) label.style.display="none";
    }
}

document.addEventListener("keydown",e=>{
    if(!gameRunning)return;
    const hitWindowTop = canvas.height - 120; // più facile da hittare
    const hitWindowBottom = canvas.height - 20;
    for(let note of notes){
        if(note.hit)continue;
        let expectedKey = columnKeys[note.column];
        if(e.key.toUpperCase() === expectedKey && note.y >= hitWindowTop && note.y <= hitWindowBottom){
            note.hit = true; combo++; totalHits++;
            const dist = Math.abs(note.y - (canvas.height - 70));
            if(dist < 15) totalPerfect++;  
            score += 100 * (1 + combo*0.05);
            let rating = "MEH";
            if(dist < 10) rating="PERFECT";
            else if(dist < 20) rating="SICK";
            else if(dist < 35) rating="AWESOME";
            else rating="NICE";
            const img=new Image();
            img.src=rating+".png";
            hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y:canvas.height-120,alpha:1});
        }
    }
});

function gameLoop(timestamp){
    if(!gameRunning)return;
    const delta=(timestamp-lastTime)/1000;
    lastTime=timestamp;
    updateNoteColors();
    spawnNotes(bgm.currentTime);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fillRect(arrowZoneOffset, canvas.height-70-hitLineHeight/2, arrowZoneWidth, hitLineHeight);
    drawColumns();
    drawKeyLabels();
    const missThreshold = canvas.height - 20;
    for(let note of notes){
        if(note.hit)continue;
        ctx.fillStyle=columnColors[note.column];
        note.y+=noteSpeed*delta;
        ctx.fillRect(arrowZoneOffset+note.column*columnWidth+10,note.y,columnWidth-20,50);
        if(note.y > missThreshold){
            note.hit = true;
            combo = 0;
            totalHits++;
            const img=new Image();
            img.src = "MISS.png";
            hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y=missThreshold,alpha:1});
        }
    }
    for(let i=hitRatings.length-1;i>=0;i--){
        const r=hitRatings[i];
        ctx.globalAlpha=r.alpha;
        ctx.drawImage(r.img,r.x-50,r.y-25,100,50);
        r.y-=1; r.alpha-=0.02;
        if(r.alpha<=0) hitRatings.splice(i,1);
    }
    ctx.globalAlpha=1;
    scoreDisplay.innerText="Punti: "+Math.floor(score);
    comboDisplay.innerText="Combo: "+combo+"x";
    requestAnimationFrame(gameLoop);
}
</script>
